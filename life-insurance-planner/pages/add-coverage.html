<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Coverage | Advisor Planning Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="home-page prospect-page profile-creation-page">
  <main class="home-shell app-home-shell prospect-shell">
    <section class="prospect-stage">
      <section class="prospect-empty-panel">
        <div class="prospect-panel-header">
          <a class="prospect-return-button" href="client-detail.html" data-return-link>Return to Profile</a>
          <div>
            <h1>Add Coverage</h1>
            <p class="coverage-form-subtitle" data-coverage-subtitle>Save policy details to this client profile.</p>
          </div>
        </div>

        <form data-coverage-form>
          <div class="panel-grid coverage-form-grid">
            <div class="field-group">
              <label for="policyCarrier">Policy Carrier</label>
              <input id="policyCarrier" name="policyCarrier" type="text" required>
            </div>
            <div class="field-group">
              <label for="policyType">Policy Type</label>
              <select id="policyType" name="policyType" required>
                <option value="">Select policy type</option>
                <option>Term</option>
                <option>Whole Life</option>
                <option>Universal Life</option>
                <option>Indexed Universal Life</option>
                <option>Variable Universal Life</option>
                <option>Final Expense</option>
                <option>Group Life</option>
                <option>Other</option>
              </select>
            </div>
            <div class="field-group">
              <label for="insuredName">Insured Name</label>
              <input id="insuredName" name="insuredName" type="text" required>
            </div>
            <div class="field-group">
              <label for="ownerName">Policy Owner</label>
              <input id="ownerName" name="ownerName" type="text">
            </div>
            <div class="field-group">
              <label for="faceAmount">Face Amount</label>
              <input id="faceAmount" name="faceAmount" type="text" inputmode="decimal" required>
            </div>
            <div class="field-group full-width">
              <label>Premium Mode</label>
              <input type="hidden" name="premiumMode" id="premiumMode">
              <div class="coverage-mode-shell" data-coverage-mode-shell>
                <div class="coverage-mode-current is-empty" data-coverage-mode-current>None Selected</div>
                <div class="coverage-mode-buttons" role="group" aria-label="Premium Mode">
                  <button type="button" class="coverage-mode-button" data-coverage-mode="Monthly">Monthly</button>
                  <button type="button" class="coverage-mode-button" data-coverage-mode="Quarterly">Quarterly</button>
                  <button type="button" class="coverage-mode-button" data-coverage-mode="Semi-Annual">Semi-Annual</button>
                  <button type="button" class="coverage-mode-button" data-coverage-mode="Annual">Annual</button>
                  <button type="button" class="coverage-mode-button" data-coverage-mode="Single Premium">Single Premium</button>
                </div>
              </div>
            </div>
            <div class="field-group" data-premium-amount-group>
              <label for="premiumAmount">Premium Amount</label>
              <input id="premiumAmount" name="premiumAmount" type="text" inputmode="decimal" disabled>
            </div>
            <div class="field-group">
              <label for="termLength">Term Length</label>
              <input id="termLength" name="termLength" type="text" inputmode="numeric">
            </div>
            <div class="field-group">
              <label for="policyNumber">Policy Number</label>
              <input id="policyNumber" name="policyNumber" type="text">
            </div>
            <div class="field-group">
              <label for="effectiveDate">Effective Date</label>
              <input id="effectiveDate" name="effectiveDate" type="date">
            </div>
            <div class="field-group">
              <label for="underwritingClass">Underwriting Class</label>
              <input id="underwritingClass" name="underwritingClass" type="text">
            </div>
            <div class="field-group">
              <label for="beneficiaryName">Primary Beneficiary</label>
              <input id="beneficiaryName" name="beneficiaryName" type="text">
            </div>
          </div>

          <div class="field-group">
            <label for="policyNotes">Policy Notes</label>
            <textarea id="policyNotes" name="policyNotes" rows="4"></textarea>
          </div>

          <p class="coverage-form-feedback" data-coverage-feedback aria-live="polite"></p>

          <div class="actions-row">
            <a class="btn-secondary" href="client-detail.html" data-cancel-link>Cancel</a>
            <button class="btn-primary" type="submit">Save Coverage</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script>
    (function () {
      const form = document.querySelector("[data-coverage-form]");
      const feedback = document.querySelector("[data-coverage-feedback]");
      const subtitle = document.querySelector("[data-coverage-subtitle]");
      const returnLink = document.querySelector("[data-return-link]");
      const cancelLink = document.querySelector("[data-cancel-link]");
      const premiumModeField = document.querySelector("#premiumMode");
      const premiumModeCurrent = document.querySelector("[data-coverage-mode-current]");
      const premiumModeButtons = Array.from(document.querySelectorAll("[data-coverage-mode]"));
      const premiumAmountField = document.querySelector("#premiumAmount");
      const premiumAmountGroup = document.querySelector("[data-premium-amount-group]");

      if (!form) {
        return;
      }

      const STORAGE_KEYS = {
        authSession: "lipPlannerAuthSession",
        clientRecords: "lensClientRecords"
      };

      function loadJson(source, key) {
        try {
          return JSON.parse(source.getItem(key) || "null");
        } catch (error) {
          return null;
        }
      }

      function getStorageIdentity() {
        const session = loadJson(localStorage, STORAGE_KEYS.authSession);
        return session?.email ? String(session.email).trim().toLowerCase() : "guest";
      }

      function getRecordsStorageKey() {
        return `${STORAGE_KEYS.clientRecords}:${getStorageIdentity()}`;
      }

      function normalizeMoney(value) {
        const normalized = String(value || "").replace(/[^0-9.]/g, "");
        const firstDot = normalized.indexOf(".");
        if (firstDot === -1) {
          return normalized;
        }
        return normalized.slice(0, firstDot + 1) + normalized.slice(firstDot + 1).replace(/\./g, "");
      }

      function getClientRecord() {
        const params = new URLSearchParams(window.location.search);
        const recordId = String(params.get("id") || "").trim();
        const records = loadJson(localStorage, getRecordsStorageKey());
        if (!recordId || !Array.isArray(records)) {
          return null;
        }
        return records.find(function (record) {
          return String(record?.id || "").trim() === recordId;
        }) || null;
      }

      function getPolicyIndex() {
        const params = new URLSearchParams(window.location.search);
        const isNewPolicy = String(params.get("newPolicy") || "").trim() === "1";
        if (isNewPolicy) {
          return -1;
        }
        const index = Number(params.get("policyIndex"));
        return Number.isInteger(index) && index >= 0 ? index : -1;
      }

      function savePolicy(recordId, policy, policyIndex) {
        const records = loadJson(localStorage, getRecordsStorageKey());
        if (!Array.isArray(records)) {
          return null;
        }

        const index = records.findIndex(function (record) {
          return String(record?.id || "").trim() === recordId;
        });

        if (index === -1) {
          return null;
        }

        const currentRecord = records[index];
        const existingPolicies = Array.isArray(currentRecord.coveragePolicies) ? currentRecord.coveragePolicies : [];
        if (policyIndex < 0 && existingPolicies.length >= 30) {
          return { error: "A maximum of 30 policies can be saved to one profile." };
        }
        const today = new Date().toISOString().slice(0, 10);
        const nextPolicies = existingPolicies.slice();
        const existingPolicy = policyIndex >= 0 ? nextPolicies[policyIndex] : null;
        const currentCoverageAmount = Number(String(currentRecord.coverageAmount || "").replace(/,/g, ""));
        const existingPolicyFaceAmount = Number(String(existingPolicy?.faceAmount || "").replace(/,/g, ""));
        const nextPolicyFaceAmount = Number(String(policy.faceAmount || "").replace(/,/g, ""));
        const nextPolicy = {
          id: existingPolicy?.id || `policy-${Date.now()}`,
          savedAt: existingPolicy?.savedAt || today,
          ...policy
        };

        if (policyIndex >= 0 && policyIndex < nextPolicies.length) {
          nextPolicies[policyIndex] = nextPolicy;
        } else {
          nextPolicies.push(nextPolicy);
        }

        const safeCurrentCoverageAmount = Number.isFinite(currentCoverageAmount) ? currentCoverageAmount : 0;
        const safeExistingPolicyFaceAmount = Number.isFinite(existingPolicyFaceAmount) ? existingPolicyFaceAmount : 0;
        const safeNextPolicyFaceAmount = Number.isFinite(nextPolicyFaceAmount) ? nextPolicyFaceAmount : 0;
        const nextCoverageAmount = safeCurrentCoverageAmount + (safeNextPolicyFaceAmount - safeExistingPolicyFaceAmount);

        const nextRecord = {
          ...currentRecord,
          coveragePolicies: nextPolicies,
          coverageAmount: Math.max(0, Math.min(nextCoverageAmount, 99999999)),
          lastUpdatedDate: today,
          lastReview: today
        };

        records[index] = nextRecord;
        localStorage.setItem(getRecordsStorageKey(), JSON.stringify(records));
        return { record: nextRecord };
      }

      function setPremiumMode(nextValue) {
        const normalized = String(nextValue || "").trim();
        if (premiumModeField) {
          premiumModeField.value = normalized;
        }

        if (premiumModeCurrent) {
          premiumModeCurrent.textContent = normalized || "None Selected";
          premiumModeCurrent.classList.toggle("is-empty", !normalized);
        }

        if (premiumAmountField) {
          premiumAmountField.disabled = !normalized;
          premiumAmountGroup?.classList.toggle("is-disabled", !normalized);
          if (!normalized) {
            premiumAmountField.value = "";
          }
        }

        premiumModeButtons.forEach(function (button) {
          button.classList.toggle("is-active", button.dataset.coverageMode === normalized);
        });
      }

      const record = getClientRecord();
      const policyIndex = getPolicyIndex();

      if (!record) {
        feedback.textContent = "No matching client profile was found.";
        form.querySelector("button[type='submit']").disabled = true;
        return;
      }

      const detailHref = `client-detail.html?id=${encodeURIComponent(String(record.id || "").trim())}`;
      returnLink.href = detailHref;
      cancelLink.href = detailHref;
      subtitle.textContent = `Save policy details to ${record.displayName || "this client"} and return to the profile.`;
      const insuredField = form.querySelector("#insuredName");
      if (insuredField && !insuredField.value) {
        insuredField.value = String(record.displayName || "").trim();
      }

      const existingPolicy = policyIndex >= 0 && Array.isArray(record.coveragePolicies)
        ? record.coveragePolicies[policyIndex]
        : null;

      if (existingPolicy) {
        document.title = "Edit Coverage | Advisor Planning Suite";
        const heading = document.querySelector("h1");
        if (heading) {
          heading.textContent = "Edit Coverage";
        }
        subtitle.textContent = `Update policy details for ${record.displayName || "this client"} and return to the profile.`;

        [
          "policyCarrier",
          "policyType",
          "insuredName",
          "ownerName",
          "faceAmount",
          "premiumAmount",
          "termLength",
          "policyNumber",
          "effectiveDate",
          "underwritingClass",
          "beneficiaryName",
          "policyNotes"
        ].forEach(function (fieldName) {
          const field = form.querySelector(`[name="${fieldName}"]`);
          if (field) {
            field.value = existingPolicy[fieldName] || "";
          }
        });
      }

      premiumModeButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          setPremiumMode(button.dataset.coverageMode || "");
        });
      });

      setPremiumMode(existingPolicy?.premiumMode || "");

      form.querySelectorAll("input[inputmode='decimal'], input[inputmode='numeric']").forEach(function (input) {
        input.addEventListener("beforeinput", function (event) {
          if (!event.data) {
            return;
          }
          if (input.inputMode === "numeric" && !/^[0-9]$/.test(event.data)) {
            event.preventDefault();
            return;
          }
          if (input.inputMode === "decimal" && !/^[0-9.]$/.test(event.data)) {
            event.preventDefault();
          }
        });

        input.addEventListener("input", function () {
          if (input.inputMode === "decimal") {
            input.value = normalizeMoney(input.value);
          } else {
            input.value = String(input.value || "").replace(/\D/g, "");
          }
        });
      });

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        feedback.textContent = "";

        if (!form.reportValidity()) {
          return;
        }

        const formData = new FormData(form);
        const policy = {
          policyCarrier: String(formData.get("policyCarrier") || "").trim(),
          policyType: String(formData.get("policyType") || "").trim(),
          insuredName: String(formData.get("insuredName") || "").trim(),
          ownerName: String(formData.get("ownerName") || "").trim(),
          faceAmount: normalizeMoney(formData.get("faceAmount")),
          premiumAmount: normalizeMoney(formData.get("premiumAmount")),
          premiumMode: String(formData.get("premiumMode") || "").trim(),
          termLength: String(formData.get("termLength") || "").trim(),
          policyNumber: String(formData.get("policyNumber") || "").trim(),
          effectiveDate: String(formData.get("effectiveDate") || "").trim(),
          underwritingClass: String(formData.get("underwritingClass") || "").trim(),
          beneficiaryName: String(formData.get("beneficiaryName") || "").trim(),
          policyNotes: String(formData.get("policyNotes") || "").trim()
        };

        const saveResult = savePolicy(String(record.id || "").trim(), policy, policyIndex);
        if (!saveResult || saveResult.error) {
          feedback.textContent = saveResult?.error || "Unable to save this policy.";
          return;
        }
        window.location.href = detailHref;
      });
    })();
  </script>
  <script src="../site-header.js"></script>
  <script src="../app.js"></script>
</body>
</html>
