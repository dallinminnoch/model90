<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preliminary Underwriting | LENS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="home-page prospect-page profile-creation-page" data-page="preliminary-linked">
  <main class="home-shell app-home-shell prospect-shell">
    <section class="prospect-stage">
      <section class="prospect-empty-panel">
        <div class="prospect-panel-header">
          <a class="prospect-return-button" href="clients.html" data-loading-link>Return to Client Directory</a>
          <h1>Preliminary Underwriting</h1>
        </div>
        <section class="profile-form-section protection-modeling-link-section">
          <div class="profile-form-section-heading">
            <h2>Client Link</h2>
          </div>
          <div class="form-grid preliminary-link-grid">
            <div class="field-group preliminary-link-button-group">
              <label for="preliminary-link-button">Search Client Directory</label>
              <button id="preliminary-link-button" class="btn btn-secondary preliminary-link-search-button" type="button" data-preliminary-link-open>Search Client Directory</button>
            </div>
            <div class="field-group">
              <label for="preliminary-case-ref">Case Ref Number</label>
              <input id="preliminary-case-ref" name="preliminaryCaseRef" type="text" placeholder="CL/00000" data-preliminary-case-ref autocomplete="new-password" autocapitalize="off" autocorrect="off" spellcheck="false" readonly>
            </div>
          </div>
          <p class="underwriting-helper-text preliminary-link-helper">Use either the search button or the case reference number to link this preliminary form to a client profile.</p>
        </section>
        <section class="entry-mode-panel">
          <div class="entry-mode-actions">
            <div class="entry-mode-option">
              <a class="btn btn-primary btn-prelim-continue entry-mode-button" href="preliminary-only-form.html" data-loading-link data-preliminary-continue aria-disabled="true" tabindex="-1">Continue to Preliminary Form</a>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>

  <div class="profile-search-modal" data-preliminary-link-modal hidden>
    <div class="profile-search-modal-backdrop" data-preliminary-link-close></div>
    <div class="profile-search-modal-panel" role="dialog" aria-modal="true" aria-labelledby="preliminary-link-modal-title">
      <button class="profile-search-modal-close" type="button" aria-label="Close search" data-preliminary-link-close>x</button>
      <div class="profile-search-modal-header">
        <h2 id="preliminary-link-modal-title">Select Client Profile</h2>
      </div>
      <div class="field-group full-width">
        <label for="preliminary-link-search-input">Search</label>
        <input id="preliminary-link-search-input" type="text" placeholder="Search client directory" data-preliminary-link-search-input>
      </div>
      <div class="profile-search-results" data-preliminary-link-results></div>
    </div>
  </div>

  <script src="../data.js"></script>
  <script src="../calculations.js"></script>
  <script src="../charts.js"></script>
  <script src="../site-header.js"></script>
  <script src="../app.js"></script>
  <script>
    (function () {
      const authSessionKey = "lipPlannerAuthSession";
      const clientRecordsKey = "lensClientRecords";
      const linkOpenButton = document.querySelector("[data-preliminary-link-open]");
      const linkModal = document.querySelector("[data-preliminary-link-modal]");
      const linkModalInput = document.querySelector("[data-preliminary-link-search-input]");
      const linkModalResults = document.querySelector("[data-preliminary-link-results]");
      const linkModalClose = document.querySelectorAll("[data-preliminary-link-close]");
      const caseRefField = document.querySelector("[data-preliminary-case-ref]");
      const continueButton = document.querySelector("[data-preliminary-continue]");
      const urlCaseRef = String(new URLSearchParams(window.location.search).get("caseRef") || "").trim().toUpperCase();
      const urlRecordId = String(new URLSearchParams(window.location.search).get("id") || "").trim();
      let linkedRecord = null;

      function getClientRecordsStorageKey() {
        let session = null;
        try {
          session = JSON.parse(localStorage.getItem(authSessionKey) || "null");
        } catch (error) {
          session = null;
        }

        const identity = session?.email ? String(session.email).trim().toLowerCase() : "guest";
        return `${clientRecordsKey}:${identity}`;
      }

      function loadClientRecords() {
        try {
          const records = JSON.parse(localStorage.getItem(getClientRecordsStorageKey()) || "[]");
          return Array.isArray(records)
            ? records.filter((record) => String(record.viewType || "").trim() === "individuals")
            : [];
        } catch (error) {
          return [];
        }
      }

      function findRecordByCaseRef(caseRef) {
        const normalizedCaseRef = String(caseRef || "").trim().toUpperCase();
        if (!normalizedCaseRef) {
          return null;
        }

        return loadClientRecords().find((record) => String(record.caseRef || "").trim().toUpperCase() === normalizedCaseRef) || null;
      }

      function updateLinkedClientButton(record) {
        linkedRecord = record || null;

        if (!linkOpenButton) {
          return;
        }

        if (!record) {
          linkOpenButton.classList.remove("is-linked");
          linkOpenButton.innerHTML = "Search Client Directory";
          if (continueButton) {
            continueButton.href = "preliminary-only-form.html";
            continueButton.setAttribute("aria-disabled", "true");
            continueButton.setAttribute("tabindex", "-1");
            continueButton.classList.add("is-disabled");
          }
          return;
        }

        linkOpenButton.classList.add("is-linked");
        linkOpenButton.innerHTML = `
          <span class="preliminary-link-button-primary">${String(record.displayName || "").trim()}</span>
          <span class="preliminary-link-button-secondary">Click to change</span>
        `;
        if (continueButton) {
          continueButton.href = `preliminary-only-form.html?caseRef=${encodeURIComponent(String(record.caseRef || "").trim())}&id=${encodeURIComponent(String(record.id || "").trim())}`;
          continueButton.setAttribute("aria-disabled", "false");
          continueButton.setAttribute("tabindex", "0");
          continueButton.classList.remove("is-disabled");
        }
      }

      function syncLinkedClientFromCaseRef() {
        const matchedRecord = findRecordByCaseRef(caseRefField?.value || "");
        updateLinkedClientButton(matchedRecord);
      }

      function openLinkModal() {
        if (!linkModal) {
          return;
        }

        linkModal.hidden = false;
        linkModal.classList.add("is-open");
        renderLinkResults();
        window.setTimeout(() => {
          linkModalInput?.focus();
        }, 20);
      }

      function closeLinkModal() {
        if (!linkModal) {
          return;
        }

        if (linkModalInput) {
          linkModalInput.value = "";
        }
        linkModal.hidden = true;
        linkModal.classList.remove("is-open");
        renderLinkResults();
      }

      function renderLinkResults() {
        if (!linkModalResults) {
          return;
        }

        const query = String(linkModalInput?.value || "").trim().toLowerCase();
        const records = loadClientRecords()
          .filter((record) => String(record.caseRef || "").trim())
          .sort((left, right) => String(left.displayName || "").localeCompare(String(right.displayName || "")));
        const filtered = records.filter((record) => {
          const displayName = String(record.displayName || "").toLowerCase();
          const caseRef = String(record.caseRef || "").toLowerCase();
          const summary = String(record.summary || "").toLowerCase();
          return !query || displayName.includes(query) || caseRef.includes(query) || summary.includes(query);
        });

        linkModalResults.innerHTML = "";

        if (!filtered.length) {
          const emptyState = document.createElement("div");
          emptyState.className = "profile-search-results-empty";
          emptyState.textContent = "No matching client profiles found.";
          linkModalResults.appendChild(emptyState);
          return;
        }

        filtered.forEach((record) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "profile-search-result-button";
          button.textContent = `${record.displayName} - ${record.caseRef}`;
          button.addEventListener("click", () => {
            if (caseRefField) {
              caseRefField.value = String(record.caseRef || "").trim();
              window.setLensLinkedCaseRef?.(caseRefField.value);
            }
            syncLinkedClientFromCaseRef();
            closeLinkModal();
          });
          linkModalResults.appendChild(button);
        });
      }

      if (caseRefField) {
        const unlockCaseRefField = () => {
          caseRefField.removeAttribute("readonly");
        };

        caseRefField.addEventListener("focus", unlockCaseRefField);
        caseRefField.addEventListener("pointerdown", unlockCaseRefField);
        caseRefField.addEventListener("input", () => {
          caseRefField.value = String(caseRefField.value || "").toUpperCase();
          const matchedRecord = findRecordByCaseRef(caseRefField.value);
          window.setLensLinkedCaseRef?.(matchedRecord ? String(matchedRecord.caseRef || "").trim() : "");
          syncLinkedClientFromCaseRef();
        });
      }

      linkOpenButton?.addEventListener("click", openLinkModal);
      linkModalInput?.addEventListener("input", renderLinkResults);
      linkModalClose.forEach((button) => {
        button.addEventListener("click", closeLinkModal);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && linkModal && !linkModal.hidden) {
          closeLinkModal();
        }
      });

      linkModal?.querySelector(".profile-search-modal-backdrop")?.addEventListener("click", closeLinkModal);
      continueButton?.addEventListener("click", (event) => {
        if (!linkedRecord) {
          event.preventDefault();
          return;
        }

        const linkedCaseRef = String(linkedRecord.caseRef || "").trim();
        window.setLensLinkedCaseRef?.(linkedCaseRef);
        window.setLensLinkedRecordId?.(String(linkedRecord.id || "").trim());
      });

      if (caseRefField && urlCaseRef) {
        caseRefField.value = urlCaseRef;
        window.setLensLinkedCaseRef?.(urlCaseRef);
        if (urlRecordId) {
          window.setLensLinkedRecordId?.(urlRecordId);
        }
      }

      if (!caseRefField?.value && urlRecordId) {
        const matchedById = loadClientRecords().find((record) => String(record?.id || "").trim() === urlRecordId) || null;
        if (matchedById && caseRefField) {
          caseRefField.value = String(matchedById.caseRef || "").trim().toUpperCase();
          window.setLensLinkedCaseRef?.(caseRefField.value);
          window.setLensLinkedRecordId?.(String(matchedById.id || "").trim());
        }
      }

      syncLinkedClientFromCaseRef();
      renderLinkResults();
    })();
  </script>
</body>
</html>
