      try {
        const session = JSON.parse(localStorage.getItem("lipPlannerAuthSession") || "null");
        const identity = session && session.email ? String(session.email).trim().toLowerCase() : "guest";
        if (localStorage.getItem(`workspaceSideNavCollapsed:${identity}`) === "1") {
          document.body.classList.add("workspace-side-nav-collapsed");
        }
      } catch (error) {
        // Ignore storage issues and fall back to the default expanded state.
      }
    })();
