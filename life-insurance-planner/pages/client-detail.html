<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Detail | Advisor Planning Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="home-page prospect-page profile-creation-page client-detail-page">
  <main class="home-shell app-home-shell prospect-shell">
    <section class="prospect-stage">
      <section class="prospect-empty-panel client-detail-panel">
        <div class="client-detail-sections" data-client-detail-host></div>
      </section>
    </section>
  </main>

  <script src="../data.js"></script>
  <script src="../calculations.js"></script>
  <script src="../charts.js"></script>
  <script src="../site-header.js"></script>
  <script src="../app.js"></script>
  <script>
    (function () {
      const host = document.querySelector("[data-client-detail-host]");

      if (!host) {
        return;
      }

      const STORAGE_KEYS = {
        authSession: "lipPlannerAuthSession",
        clientRecords: "lensClientRecords"
      };

      function loadJson(source, key) {
        try {
          return JSON.parse(source.getItem(key) || "null");
        } catch (error) {
          return null;
        }
      }

      function getStorageIdentity() {
        const session = loadJson(localStorage, STORAGE_KEYS.authSession);
        return session?.email ? String(session.email).trim().toLowerCase() : "guest";
      }

      function getRecordsStorageKey() {
        return `${STORAGE_KEYS.clientRecords}:${getStorageIdentity()}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizePriority(value) {
        const normalized = String(value || "").trim().toLowerCase();
        return ["low", "medium", "high"].includes(normalized) ? normalized : "";
      }

      function getPriorityDisplay(value) {
        if (value === "high") {
          return "High";
        }
        if (value === "medium") {
          return "Medium";
        }
        if (value === "low") {
          return "Low";
        }
        return "Not provided";
      }

      function getClientStatusDisplay(value) {
        if (value === "in-review") {
          return "In Review";
        }
        if (value === "coverage-placed") {
          return "Coverage Placed";
        }
        if (value === "closed") {
          return "Closed";
        }
        return "Prospect";
      }

      function formatDate(value) {
        if (!value) {
          return "Not provided";
        }

        const date = new Date(`${value}T00:00:00`);
        if (Number.isNaN(date.getTime())) {
          return String(value);
        }

        return `${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")}/${date.getFullYear()}`;
      }

      function formatCurrency(value) {
        const number = Number(String(value || "").replace(/,/g, ""));
        if (!number) {
          return "Not provided";
        }

        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          maximumFractionDigits: 0
        }).format(number);
      }

      function formatCurrencyTotal(value) {
        const number = Number(value);
        const safeNumber = Number.isFinite(number) ? number : 0;
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          maximumFractionDigits: 0
        }).format(safeNumber);
      }

      function parseCurrencyNumber(value) {
        const number = Number(String(value || "").replace(/[^0-9.-]/g, ""));
        return Number.isFinite(number) ? number : 0;
      }

      function formatValue(value) {
        if (value === null || value === undefined) {
          return "Not provided";
        }

        const normalized = String(value).trim();
        return normalized || "Not provided";
      }

      function formatTitleCaseValue(value) {
        const normalized = formatValue(value);
        if (normalized === "Not provided") {
          return normalized;
        }
        return normalized
          .split(/[\s/-]+/)
          .map(function (part) {
            return part ? part.charAt(0).toUpperCase() + part.slice(1).toLowerCase() : part;
          })
          .join(" ");
      }

      function getInitials(value) {
        const words = String(value || "").trim().split(/\s+/).filter(Boolean);
        if (!words.length) {
          return "CL";
        }
        return words.slice(0, 2).map(function (word) {
          return word.charAt(0).toUpperCase();
        }).join("");
      }

      function getAvatarAge(ageValue, dateOfBirthValue) {
        const numericAge = Number(ageValue);
        if (Number.isFinite(numericAge) && numericAge > 0) {
          return Math.max(0, Math.min(100, numericAge));
        }

        const birthDateValue = String(dateOfBirthValue || "").trim();
        if (!birthDateValue) {
          return null;
        }

        const birthDate = new Date(`${birthDateValue}T00:00:00`);
        if (Number.isNaN(birthDate.getTime())) {
          return null;
        }

        const today = new Date();
        let calculatedAge = today.getFullYear() - birthDate.getFullYear();
        const monthDifference = today.getMonth() - birthDate.getMonth();
        if (monthDifference < 0 || (monthDifference === 0 && today.getDate() < birthDate.getDate())) {
          calculatedAge -= 1;
        }

        return Number.isFinite(calculatedAge) ? Math.max(0, Math.min(100, calculatedAge)) : null;
      }

      function interpolateNumber(start, end, progress) {
        return start + ((end - start) * progress);
      }

      function getAvatarHue(ageValue, dateOfBirthValue) {
        const age = getAvatarAge(ageValue, dateOfBirthValue);
        if (age === null) {
          return 210;
        }

        if (age <= 18) {
          return interpolateNumber(48, 60, age / 18);
        }

        if (age <= 30) {
          return interpolateNumber(60, 210, (age - 18) / 12);
        }

        if (age <= 65) {
          return interpolateNumber(210, 280, (age - 30) / 35);
        }

        return interpolateNumber(280, 360, (age - 65) / 35);
      }

      function getAvatarBackground(ageValue, dateOfBirthValue) {
        const hue = getAvatarHue(ageValue, dateOfBirthValue);
        const highlightHue = hue;
        const shadowHue = (hue + 22) % 360;
        return `linear-gradient(135deg, hsl(${highlightHue} 72% 66%), hsl(${shadowHue} 68% 44%))`;
      }

      function getAccountMilestones(record) {
        const hasProfile = Boolean(String(record.id || "").trim());
        const hasPreliminary = Boolean(record.preliminaryUnderwritingCompleted);
        const hasPmi = Boolean(record.pmiCompleted);
        const hasAnalysis = Boolean(record.analysisCompleted) || record.statusGroup === "coverage-placed" || record.statusGroup === "closed";
        const hasCoveragePlaced = (Array.isArray(record.coveragePolicies) && record.coveragePolicies.length > 0)
          || record.statusGroup === "coverage-placed"
          || record.statusGroup === "closed";

        return [
          { label: "Profile Created", complete: hasProfile, color: "#2f5d46" },
          { label: "Preliminary Underwriting", complete: hasPreliminary, color: "#9a7b5f" },
          { label: "PMI", complete: hasPmi, color: "#7c5cff" },
          { label: "Analysis Complete", complete: hasAnalysis, color: "#1f2937" },
          { label: "Coverage Placed", complete: hasCoveragePlaced, color: "#d97f6f" }
        ];
      }

      function calculateProfileCompletion(record) {
        const milestones = getAccountMilestones(record);
        const completed = milestones.filter(function (milestone) {
          return milestone.complete;
        }).length;
        return Math.round((completed / milestones.length) * 100);
      }

      function getProfileRingGroups(record) {
        const milestones = getAccountMilestones(record);
        const overallCompletion = calculateProfileCompletion(record) / 100;

        return [
          {
            key: "overall",
            label: milestones.map(function (milestone) {
              return milestone.label;
            }).join(" | "),
            color: "#111111",
            completion: overallCompletion
          },
          {
            key: "accent",
            label: "Profile Accent",
            color: "#b8d8ff",
            completion: 1
          }
        ];
      }

      function buildDonutGradient(milestones) {
        const inactiveColors = {
          "#2f5d46": "rgba(47, 93, 70, 0.24)",
          "#9a7b5f": "rgba(154, 123, 95, 0.42)",
          "#7c5cff": "rgba(124, 92, 255, 0.26)",
          "#1f2937": "rgba(31, 41, 55, 0.2)",
          "#d97f6f": "rgba(217, 127, 111, 0.42)"
        };
        const segmentSize = 100 / milestones.length;
        const separator = 0.6;
        const separatorColor = "#f8fbf9";

        return milestones.map(function (milestone, index) {
          const start = (segmentSize * index).toFixed(2);
          const end = (segmentSize * (index + 1)).toFixed(2);
          const innerStart = (segmentSize * index + separator).toFixed(2);
          const innerEnd = (segmentSize * (index + 1) - separator).toFixed(2);
          const color = milestone.complete ? milestone.color : (inactiveColors[milestone.color] || "rgba(148, 163, 184, 0.2)");
          return `${separatorColor} ${start}% ${innerStart}%, ${color} ${innerStart}% ${innerEnd}%, ${separatorColor} ${innerEnd}% ${end}%`;
        }).join(", ");
      }

      function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
        const angleInRadians = (angleInDegrees - 90) * Math.PI / 180;
        return {
          x: centerX + (radius * Math.cos(angleInRadians)),
          y: centerY + (radius * Math.sin(angleInRadians))
        };
      }

      function describeArc(centerX, centerY, radius, startAngle, endAngle) {
        const start = polarToCartesian(centerX, centerY, radius, endAngle);
        const end = polarToCartesian(centerX, centerY, radius, startAngle);
        const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
        return `M ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArcFlag} 0 ${end.x} ${end.y}`;
      }

      function describeAnnularSector(centerX, centerY, outerRadius, innerRadius, startAngle, endAngle) {
        const outerStart = polarToCartesian(centerX, centerY, outerRadius, startAngle);
        const outerEnd = polarToCartesian(centerX, centerY, outerRadius, endAngle);
        const innerEnd = polarToCartesian(centerX, centerY, innerRadius, endAngle);
        const innerStart = polarToCartesian(centerX, centerY, innerRadius, startAngle);
        const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";

        return [
          `M ${outerStart.x} ${outerStart.y}`,
          `A ${outerRadius} ${outerRadius} 0 ${largeArcFlag} 1 ${outerEnd.x} ${outerEnd.y}`,
          `L ${innerEnd.x} ${innerEnd.y}`,
          `A ${innerRadius} ${innerRadius} 0 ${largeArcFlag} 0 ${innerStart.x} ${innerStart.y}`,
          "Z"
        ].join(" ");
      }

      function buildDonutSvg(record) {
        const center = 80;
        const ringSweep = 300;
        const startAngle = 210;
        const trackColor = "#e7edf4";
        const ringGroups = getProfileRingGroups(record);
        const rings = [
          { radius: 69, strokeWidth: 14, segmented: true },
          { radius: 43, strokeWidth: 2.6, segmented: false }
        ];
        const outerTickCount = 78;
        const outerTickSweep = 0.62;
        const outerTickStep = ringSweep / outerTickCount;

        function buildSegmentGroup(milestone, index, pathMarkup, hoverX, hoverY, suffix) {
          const ringDelay = suffix === "ticks" ? `${index * 140}ms` : "0ms";
          return `
            <g
              class="client-detail-donut-segment-group ${milestone.complete ? "is-complete" : "is-pending"}"
              data-segment-id="segment-${index}${suffix ? `-${suffix}` : ""}"
              data-segment-key="segment-${index}"
              data-milestone-label="${escapeHtml(milestone.label)}"
              data-hover-x="${hoverX}"
              data-hover-y="${hoverY}"
              style="--ring-delay: ${ringDelay};"
            >
              ${pathMarkup}
            </g>
          `;
        }

        function buildOuterTickRing(ring, geometry, index) {
          const completedTicks = Math.round(outerTickCount * ring.completion);
          const centerAngle = startAngle + (ringSweep / 2);
          const hoverRadians = (centerAngle - 90) * Math.PI / 180;
          const hoverX = (Math.cos(hoverRadians) * 4).toFixed(2);
          const hoverY = (Math.sin(hoverRadians) * 4).toFixed(2);

          const tickMarkup = Array.from({ length: outerTickCount }, function (_, tickIndex) {
            const tickStart = startAngle + (tickIndex * outerTickStep);
            const tickEnd = tickStart + outerTickSweep;
            const tickPath = describeArc(center, center, geometry.radius, tickStart, tickEnd);
            const tickColor = tickIndex < completedTicks ? ring.color : trackColor;
            const tickClass = tickIndex < completedTicks
              ? "client-detail-donut-ring-tick is-complete"
              : "client-detail-donut-ring-tick is-track";

            return `
              <path
                class="${tickClass}"
                d="${tickPath}"
                stroke="${tickColor}"
                stroke-width="${geometry.strokeWidth + 0.9}"
                fill="none"
                stroke-linecap="butt"
                style="--tick-delay: ${index * 140 + tickIndex * 16}ms;"
              />
            `;
          }).join("");

          return buildSegmentGroup(
            {
              complete: ring.completion >= 1,
              label: ring.label
            },
            index,
            tickMarkup,
            hoverX,
            hoverY,
            "ticks"
          );
        }

        const segments = ringGroups.map(function (ring, index) {
          const geometry = rings[index];
          if (geometry.segmented) {
            return buildOuterTickRing(ring, geometry, index);
          }
          const ringStartAngle = ring.key === "accent" ? startAngle - 120 : startAngle;
          const endAngle = ringStartAngle + ringSweep;
          const progressEndAngle = ringStartAngle + (ringSweep * ring.completion);
          const centerAngle = ringStartAngle + (ringSweep / 2);
          const hoverRadians = (centerAngle - 90) * Math.PI / 180;
          const hoverX = (Math.cos(hoverRadians) * 4).toFixed(2);
          const hoverY = (Math.sin(hoverRadians) * 4).toFixed(2);
          const trackPath = describeArc(center, center, geometry.radius, ringStartAngle, endAngle);
          const progressPath = ring.completion > 0
            ? describeArc(center, center, geometry.radius, ringStartAngle, progressEndAngle)
            : "";
          return buildSegmentGroup(
            {
              complete: ring.completion >= 1,
              label: ring.label
            },
            index,
            `
              <path
                class="client-detail-donut-ring-track${ring.key === "accent" ? " is-placement" : ""}"
                d="${trackPath}"
                stroke="${trackColor}"
                stroke-width="${geometry.strokeWidth}"
                fill="none"
                pathLength="100"
              />
              ${progressPath ? `
                <path
                  class="client-detail-donut-ring-progress${ring.key === "accent" ? " is-placement" : ""}"
                  d="${progressPath}"
                  stroke="${ring.key === "accent" ? "url(#client-detail-placement-gradient)" : ring.color}"
                  stroke-width="${geometry.strokeWidth}"
                  fill="none"
                  pathLength="100"
                />
                ${ring.key === "accent" ? `
                  <path
                    class="client-detail-donut-ring-progress-gloss is-placement"
                    d="${progressPath}"
                    stroke="url(#client-detail-placement-gloss)"
                    stroke-width="${Math.max(1.5, geometry.strokeWidth * 0.42)}"
                    fill="none"
                    pathLength="100"
                  />
                ` : ""}
              ` : ""}
            `,
            hoverX,
            hoverY,
            ""
          );
        }).join("");

        return `
          <svg class="client-detail-donut-svg" viewBox="0 0 160 160" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="client-detail-placement-gradient" x1="24" y1="24" x2="136" y2="136" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#4120e8"></stop>
                <stop offset="22%" stop-color="#6a3dff"></stop>
                <stop offset="48%" stop-color="#2f8f5b"></stop>
                <stop offset="70%" stop-color="#8dd4a8"></stop>
                <stop offset="100%" stop-color="#0d3fe6"></stop>
              </linearGradient>
              <linearGradient id="client-detail-placement-gloss" x1="36" y1="32" x2="124" y2="128" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.38"></stop>
                <stop offset="30%" stop-color="#ffffff" stop-opacity="0.14"></stop>
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
              </linearGradient>
            </defs>
            ${segments}
          </svg>
        `;
      }

      function getRecord() {
        const params = new URLSearchParams(window.location.search);
        const recordId = String(params.get("id") || "").trim();
        const caseRef = String(params.get("caseRef") || "").trim().toUpperCase();
        const records = loadJson(localStorage, getRecordsStorageKey());
        if (!Array.isArray(records)) {
          return null;
        }

        if (recordId) {
          const matchedById = records.find(function (item) {
            return String(item?.id || "").trim() === recordId;
          }) || null;
          if (matchedById) {
            return matchedById;
          }
        }

        if (caseRef) {
          return records.find(function (item) {
            return String(item?.caseRef || "").trim().toUpperCase() === caseRef;
          }) || null;
        }

        return null;
      }

      function getLatestRecordSnapshot() {
        const records = loadJson(localStorage, getRecordsStorageKey());
        if (!Array.isArray(records)) {
          return record;
        }

        const matched = records.find(function (item) {
          return String(item?.id || "").trim() === String(record?.id || "").trim();
        });

        return matched || record;
      }

      function getPrimaryLinkedClientForHousehold(householdRecord) {
        const householdId = String(householdRecord?.id || "").trim();
        if (!householdId) {
          return null;
        }

        const records = loadJson(localStorage, getRecordsStorageKey());
        if (!Array.isArray(records)) {
          return null;
        }

        const linkedIndividuals = records.filter(function (item) {
          return String(item?.viewType || "").trim() === "individuals"
            && String(item?.householdId || "").trim() === householdId;
        });

        if (!linkedIndividuals.length) {
          return null;
        }

        return linkedIndividuals.find(function (item) {
          return String(item?.householdRole || "").trim().toLowerCase() === "primary client";
        }) || linkedIndividuals[0] || null;
      }

      function getLinkedIndividualsForHousehold(householdRecord) {
        const householdId = String(householdRecord?.id || "").trim();
        if (!householdId) {
          return [];
        }

        const records = loadJson(localStorage, getRecordsStorageKey());
        if (!Array.isArray(records)) {
          return [];
        }

        return records.filter(function (item) {
          return String(item?.viewType || "").trim() === "individuals"
            && String(item?.householdId || "").trim() === householdId;
        });
      }

      function getRequestedTab() {
        const params = new URLSearchParams(window.location.search);
        const requestedTab = String(params.get("tab") || "").trim().toLowerCase();
        return ["overview", "planning", "household", "notes"].includes(requestedTab)
          ? requestedTab
          : "overview";
      }

      function renderSection(sectionTitle, fields, options) {
        const sectionClassName = String(options?.className || "").trim();
        return `
          <section class="client-detail-card${sectionClassName ? ` ${escapeHtml(sectionClassName)}` : ""}">
            <div class="client-detail-card-header">
              <h2>${escapeHtml(sectionTitle)}</h2>
            </div>
            <div class="client-detail-grid">
              ${fields.map(function (field) {
                return `
                  <div class="client-detail-field">
                    <span class="client-detail-label">${escapeHtml(field.label)}</span>
                    <span class="client-detail-value">${escapeHtml(field.value)}</span>
                  </div>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }

      function renderSummaryCard(title, items) {
        return `
          <section class="client-detail-card client-detail-card-compact">
            <div class="client-detail-card-header">
              <h2>${escapeHtml(title)}</h2>
            </div>
            <div class="client-summary-list">
              ${items.map(function (item) {
                return `
                  <div class="client-summary-item">
                    <span class="client-summary-label">${escapeHtml(item.label)}</span>
                    <span class="client-summary-value">${escapeHtml(item.value)}</span>
                  </div>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }

      function renderSplitSummaryCard(title, leftItems, rightItems) {
        return `
          <section class="client-detail-card client-detail-card-compact client-detail-card-split">
            <div class="client-detail-card-header">
              <h2>${escapeHtml(title)}</h2>
            </div>
            <div class="client-summary-split">
              <div class="client-summary-list">
                ${leftItems.map(function (item) {
                  return `
                    <div class="client-summary-item">
                      <span class="client-summary-label">${escapeHtml(item.label)}</span>
                      <span class="client-summary-value">${escapeHtml(item.value)}</span>
                    </div>
                  `;
                }).join("")}
              </div>
              <div class="client-summary-list client-summary-list-secondary">
                ${rightItems.map(function (item) {
                  return `
                    <div class="client-summary-item">
                      <span class="client-summary-label">${escapeHtml(item.label)}</span>
                      <span class="client-summary-value">${escapeHtml(item.value)}</span>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>
          </section>
        `;
      }

      function renderBlankCard() {
        return `
          <section class="client-detail-card client-detail-card-compact client-detail-card-blank" aria-hidden="true"></section>
        `;
      }

      function renderCoverageBreakdownCard(record) {
        const policies = Array.isArray(record.coveragePolicies) ? record.coveragePolicies : [];
        const totalFaceAmount = policies.reduce(function (sum, policy) {
          return sum + parseCurrencyNumber(policy.faceAmount);
        }, 0);
        const totalPremium = policies.reduce(function (sum, policy) {
          return sum + parseCurrencyNumber(policy.premiumAmount);
        }, 0);
        const latestEffectiveDate = policies.reduce(function (latest, policy) {
          const value = new Date(policy.effectiveDate || "").getTime();
          return Number.isFinite(value) && value > latest ? value : latest;
        }, 0);
        const typeCounts = new Map();
        const modeCounts = new Map();

        policies.forEach(function (policy) {
          const policyType = formatValue(policy.policyType);
          const premiumMode = formatValue(policy.premiumMode);

          if (policyType !== "Not provided") {
            typeCounts.set(policyType, (typeCounts.get(policyType) || 0) + 1);
          }

          if (premiumMode !== "Not provided") {
            modeCounts.set(premiumMode, (modeCounts.get(premiumMode) || 0) + 1);
          }
        });

        const typeSummary = Array.from(typeCounts.entries())
          .sort(function (a, b) { return b[1] - a[1]; })
          .slice(0, 3)
          .map(function (entry) { return `${entry[0]} ${entry[1]}`; })
          .join(" | ") || "Not provided";

        const modeSummary = Array.from(modeCounts.entries())
          .sort(function (a, b) { return b[1] - a[1]; })
          .slice(0, 3)
          .map(function (entry) { return `${entry[0]} ${entry[1]}`; })
          .join(" | ") || "Not provided";

        return `
          <section class="client-detail-card client-detail-card-compact client-coverage-breakdown-card">
            <div class="client-detail-card-header">
              <h2>Coverage Breakdown Summary</h2>
            </div>
            <div class="client-coverage-breakdown-grid">
              <div class="client-summary-item">
                <span class="client-summary-label">Policies Placed</span>
                <span class="client-summary-value">${escapeHtml(String(policies.length))}</span>
              </div>
              <div class="client-summary-item">
                <span class="client-summary-label">Total Face Amount</span>
                <span class="client-summary-value">${escapeHtml(formatCurrencyTotal(totalFaceAmount))}</span>
              </div>
              <div class="client-summary-item">
                <span class="client-summary-label">Total Premium</span>
                <span class="client-summary-value">${escapeHtml(formatCurrencyTotal(totalPremium))}</span>
              </div>
              <div class="client-summary-item">
                <span class="client-summary-label">Latest Effective</span>
                <span class="client-summary-value">${escapeHtml(latestEffectiveDate ? formatDate(new Date(latestEffectiveDate).toISOString().slice(0, 10)) : "Not provided")}</span>
              </div>
            </div>
            <div class="client-coverage-breakdown-lines">
              <div class="client-coverage-breakdown-line">
                <span>Policy Types</span>
                <strong>${escapeHtml(typeSummary)}</strong>
              </div>
              <div class="client-coverage-breakdown-line">
                <span>Premium Modes</span>
                <strong>${escapeHtml(modeSummary)}</strong>
              </div>
            </div>
          </section>
        `;
      }

      function formatListValue(value) {
        if (Array.isArray(value)) {
          const normalized = value.map(function (item) {
            return String(item || "").trim();
          }).filter(Boolean);
          return normalized.length ? normalized.join(", ") : "Not provided";
        }

        return formatValue(value);
      }

      function getPlanningStatus(record) {
        const hasPreliminary = Boolean(record.preliminaryUnderwritingCompleted);
        const hasPmi = Boolean(record.pmiCompleted);
        const hasAnalysis = Boolean(record.analysisCompleted) || record.statusGroup === "coverage-placed" || record.statusGroup === "closed";

        if (hasAnalysis) {
          return "Analysis Complete";
        }

        if (hasPreliminary && hasPmi) {
          return "Ready for Analysis";
        }

        if (hasPreliminary || hasPmi) {
          return "Planning In Progress";
        }

        return "Planning Not Started";
      }

      function getPlanningNextStep(record) {
        if (!record.preliminaryUnderwritingCompleted) {
          return "Complete preliminary underwriting";
        }

        if (!record.pmiCompleted) {
          return "Finish protection modeling inputs";
        }

        if (!(Boolean(record.analysisCompleted) || record.statusGroup === "coverage-placed" || record.statusGroup === "closed")) {
          return "Complete analysis review";
        }

        return "Review placed coverage";
      }

      function getRiskSummary(record) {
        const data = record.preliminaryUnderwriting?.data || {};
        const bmi = Number(data.bodyMassIndex || 0);
        const conditions = Array.isArray(data.majorMedicalConditions)
          ? data.majorMedicalConditions.filter(Boolean)
          : (String(data.majorMedicalConditions || "").trim() ? [String(data.majorMedicalConditions || "").trim()] : []);
        const nicotineStatus = String(data.nicotineUseStatus || "").trim().toLowerCase();

        if (!record.preliminaryUnderwritingCompleted) {
          return "Awaiting preliminary underwriting";
        }

        if (nicotineStatus.includes("current") || conditions.length >= 3 || bmi >= 35) {
          return "Elevated risk";
        }

        if (nicotineStatus.includes("former") || conditions.length >= 1 || bmi >= 30) {
          return "Moderate risk";
        }

        return "Lower apparent risk";
      }

      function renderPlanningCard(title, items, className) {
        return `
          <section class="client-detail-card client-detail-card-compact client-planning-card${className ? ` ${className}` : ""}">
            <div class="client-detail-card-header">
              <h2>${escapeHtml(title)}</h2>
            </div>
            <div class="client-summary-list">
              ${items.map(function (item) {
                return `
                  <div class="client-summary-item">
                    <span class="client-summary-label">${escapeHtml(item.label)}</span>
                    <span class="client-summary-value">${escapeHtml(item.value)}</span>
                  </div>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }

      function renderAnalysisPreviewCard(record) {
        const planningStatus = getPlanningStatus(record);
        const nextStep = getPlanningNextStep(record);
        const latestPlanningDate = formatDate(
          record.analysisCompletedDate
          || record.protectionModeling?.savedAt
          || record.preliminaryUnderwriting?.savedAt
          || record.lastUpdatedDate
          || record.dateProfileCreated
        );

        return renderPlanningCard("Analysis Preview", [
          { label: "Planning Status", value: planningStatus },
          { label: "Coverage Adequacy", value: `${getCoverageAdequacy(record)}%` },
          { label: "Coverage Amount", value: formatCoverageCardCurrency(record.coverageAmount) },
          { label: "Coverage Gap", value: formatCoverageCardCurrency(record.coverageGap) },
          { label: "Last Planning Update", value: latestPlanningDate },
          { label: "Next Planning Move", value: nextStep }
        ], "client-planning-card-wide");
      }

      function renderPmiEntryCard(record) {
        const modelingEntries = Array.isArray(record.protectionModelingEntries) && record.protectionModelingEntries.length
          ? record.protectionModelingEntries
          : (record.protectionModeling ? [record.protectionModeling] : []);
        const latestModeling = modelingEntries[modelingEntries.length - 1] || {};
        const modelingData = latestModeling.data || {};
        return `
          <section class="client-detail-card client-detail-card-compact client-planning-card client-planning-card-pmi">
            <div class="client-detail-card-header">
              <h2>Protection Modeling Inputs</h2>
            </div>
            <div class="client-summary-list">
              ${[
                { label: "Status", value: record.pmiCompleted ? "Completed" : "Not started" },
                { label: "Forms Saved", value: String(modelingEntries.length || 0) },
                { label: "Latest Saved At", value: record.pmiCompleted ? formatDate(latestModeling.savedAt) : "Not provided" },
                { label: "Linked Case Ref", value: formatValue(latestModeling.linkedCaseRef || record.caseRef) },
                { label: "Latest Entry Variant", value: formatValue(latestModeling.variant) },
                { label: "Current Coverage", value: formatCurrency(modelingData.currentCoverageAmount || modelingData.currentLifeInsuranceCoverage || 0) },
                { label: "Income Input", value: formatCurrency(modelingData.annualIncome || modelingData.householdIncome || 0) }
              ].map(function (item) {
                return `
                  <div class="client-summary-item">
                    <span class="client-summary-label">${escapeHtml(item.label)}</span>
                    <span class="client-summary-value">${escapeHtml(item.value)}</span>
                  </div>
                `;
              }).join("")}
            </div>
            <button class="client-planning-view-all" type="button" data-pmi-detail-open>
              <span>View All</span>
              <span class="client-planning-view-all-icon" aria-hidden="true"></span>
            </button>
          </section>
        `;
      }

      function formatPlanningDetailValue(value) {
        if (Array.isArray(value)) {
          const normalized = value.map(function (item) {
            return String(item || "").trim();
          }).filter(Boolean);
          return normalized.length ? normalized.join(", ") : "Not provided";
        }

        if (value === null || value === undefined || value === "") {
          return "Not provided";
        }

        return String(value).trim() || "Not provided";
      }

      function humanizePlanningKey(key) {
        return String(key || "")
          .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
          .replace(/[_-]+/g, " ")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/\b\w/g, function (letter) { return letter.toUpperCase(); });
      }

      function renderPmiDetailModalBody(record) {
        const modelingEntries = Array.isArray(record.protectionModelingEntries) && record.protectionModelingEntries.length
          ? record.protectionModelingEntries
          : (record.protectionModeling ? [record.protectionModeling] : []);

        if (!modelingEntries.length) {
          return `
            <div class="client-policy-modal-grid">
              <div class="client-policy-modal-field">
                <span class="client-policy-modal-label">Status</span>
                <span class="client-policy-modal-value">Not started</span>
              </div>
            </div>
          `;
        }

        return modelingEntries.map(function (modeling, index) {
          const modelingData = modeling.data || {};
          const detailFields = [
            ["Form", String(index + 1)],
            ["Saved At", formatDate(modeling.savedAt)],
            ["Linked Case Ref", formatValue(modeling.linkedCaseRef || record.caseRef)],
            ["Entry Variant", formatValue(modeling.variant)],
            ["Page", formatValue(modeling.page)]
          ];

          Object.entries(modelingData).forEach(function (entry) {
            detailFields.push([humanizePlanningKey(entry[0]), formatPlanningDetailValue(entry[1])]);
          });

          return `
            <div class="client-policy-modal-grid">
              ${detailFields.map(function (field) {
                return `
                  <div class="client-policy-modal-field">
                    <span class="client-policy-modal-label">${escapeHtml(field[0])}</span>
                    <span class="client-policy-modal-value">${escapeHtml(field[1])}</span>
                  </div>
                `;
              }).join("")}
            </div>
          `;
        }).join('<div class="client-policy-modal-divider"></div>');
      }

      function getChecklistAction(record, item) {
        if (!record || !item || item.complete) {
          return null;
        }

        const caseRef = String(record.caseRef || "").trim();
        const encodedCaseRef = encodeURIComponent(caseRef);
        const recordId = String(record.id || "").trim();
        const encodedRecordId = encodeURIComponent(recordId);

        if (item.label === "Preliminary Underwriting" && caseRef) {
          return {
            href: `preliminary-linked.html?caseRef=${encodedCaseRef}&id=${encodedRecordId}`,
            label: "Open Form"
          };
        }

        if (item.label === "Protection Modeling Inputs" && caseRef) {
          return {
            href: `protection-modeling-inputs.html?caseRef=${encodedCaseRef}`,
            label: "Open Form"
          };
        }

        if (item.label === "Complete Analysis" && caseRef) {
          return {
            href: `analysis-estimate.html?caseRef=${encodedCaseRef}`,
            label: "Open Form"
          };
        }

        if (item.label === "Create Profile") {
          return {
            href: "profile-only-form.html",
            label: "Open Form"
          };
        }

        return null;
      }

      function renderRiskAnalysisCard(record) {
        const data = record.preliminaryUnderwriting?.data || {};
        const conditions = formatListValue(data.majorMedicalConditions);
        return renderPlanningCard("Risk Analysis", [
          { label: "Risk View", value: getRiskSummary(record) },
          { label: "Nicotine Use", value: formatValue(data.nicotineUseStatus) },
          { label: "Diabetes Status", value: formatValue(data.diabetesStatus) },
          { label: "Major Conditions", value: conditions },
          { label: "Occupation Risk", value: formatValue(data.occupationRiskLevel) },
          { label: "Travel Outside US", value: formatValue(data.plannedTravelOutsideUs) }
        ]);
      }

      function renderPreliminaryResultsCard(record) {
        const data = record.preliminaryUnderwriting?.data || {};
        const treatmentCategories = Array.isArray(data.treatmentCategories)
          ? data.treatmentCategories
          : (Array.isArray(data.selectedTreatmentCategories)
            ? data.selectedTreatmentCategories
            : String(data.treatmentCategories || data.selectedTreatmentCategoriesDisplay || data.selectedTreatmentCategories || "")
              .split("|")
              .map(function (item) { return String(item || "").trim(); })
              .filter(Boolean));
        return renderPlanningCard("Preliminary Results", [
          { label: "Status", value: record.preliminaryUnderwritingCompleted ? "Completed" : "Not started" },
          { label: "Saved At", value: record.preliminaryUnderwritingCompleted ? formatDate(record.preliminaryUnderwriting?.savedAt) : "Not provided" },
          { label: "Linked Case Ref", value: record.preliminaryUnderwritingCompleted ? formatValue(record.preliminaryUnderwriting?.linkedCaseRef || record.caseRef) : "Not provided" },
          { label: "Height", value: `${formatValue(data.heightFeet)} ft ${formatValue(data.heightInches)} in`.replace("Not provided ft Not provided in", "Not provided") },
          { label: "Weight", value: data.weight ? `${String(data.weight).trim()} lbs` : "Not provided" },
          { label: "BMI", value: formatValue(data.bodyMassIndex) },
          { label: "Treatment Categories", value: formatListValue(treatmentCategories) }
        ]);
      }

      function renderFooterBar(record) {
        const policies = Array.isArray(record.coveragePolicies) ? record.coveragePolicies : [];
        const policyCount = policies.length;
        const nextFollowUp = record.lastReview || record.lastUpdatedDate || record.dateProfileCreated;
        const coveragePlaced = policyCount > 0 || record.statusGroup === "coverage-placed" || record.statusGroup === "closed";
        return `
          <section class="client-detail-card client-detail-card-compact client-footer-strip">
            <div class="client-footer-strip-inner">
              <div class="client-footer-strip-item">
                <span class="client-footer-strip-label">Policies Placed</span>
                <strong>${escapeHtml(String(policyCount))}</strong>
              </div>
              <div class="client-footer-strip-item">
                <span class="client-footer-strip-label">Next Follow-Up</span>
                <strong>${escapeHtml(formatDate(nextFollowUp))}</strong>
              </div>
              <div class="client-footer-strip-item">
                <span class="client-footer-strip-label">Coverage Status</span>
                <strong>${escapeHtml(coveragePlaced ? "Placed" : "In Progress")}</strong>
              </div>
            </div>
          </section>
        `;
      }

      function renderActivityPreview(record) {
        const activityEntries = Array.isArray(record.activityLog) ? record.activityLog.slice(0, 3) : [];
        const fallbackNotes = String(record.clientNotes || "").trim()
          ? String(record.clientNotes || "").trim().split(/\r?\n+/).map(function (line) { return line.trim(); }).filter(Boolean).slice(0, 3)
          : [];
        const previewItems = activityEntries.length
          ? activityEntries.map(function (entry) {
              const label = getActivityPreviewLabel(entry);
              const detail = getActivityPreviewDetail(entry);
              if (!label && !detail) {
                return "";
              }
              return `
                <strong>${escapeHtml(label || "Activity")}:</strong>${detail ? ` ${escapeHtml(detail)}` : ""}
              `;
            }).filter(Boolean)
          : fallbackNotes;

        if (!previewItems.length) {
          return `<p class="client-notes-widget-empty">No activity logged yet.</p>`;
        }

        return `
          <div class="client-notes-widget-list">
            ${previewItems.map(function (line, index) {
              const entry = activityEntries[index] || null;
              const stamp = entry?.date ? formatDate(entry.date) : "";
              return `
                <div class="client-notes-widget-item">
                  <span class="client-notes-widget-dot" aria-hidden="true"></span>
                  <span class="client-notes-widget-copy">${line}</span>
                  <span class="client-notes-widget-date">${escapeHtml(stamp)}</span>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      function getActivityPreviewLabel(entry) {
        const type = String(entry?.type || "").trim().toLowerCase();
        if (type === "note") {
          return "Note";
        }
        if (type === "email") {
          return "Email";
        }
        if (type === "phone") {
          return "Phone Call";
        }
        if (type === "schedule") {
          return "Scheduled Meeting";
        }
        if (type === "meeting") {
          return "Meeting";
        }
        if (type === "reminder") {
          return "Reminder";
        }
        return "";
      }

      function getActivityPreviewDetail(entry) {
        if (entry && typeof entry.detail === "string" && entry.detail.trim()) {
          return entry.detail.trim();
        }

        const summary = String(entry?.summary || "").trim();
        const type = String(entry?.type || "").trim().toLowerCase();
        if (!summary) {
          return "";
        }

        if (type === "note") {
          return summary.replace(/^Note:\s*/i, "");
        }
        if (type === "email") {
          return summary.replace(/^Email\b[\s:]*/i, "");
        }
        if (type === "phone") {
          return summary.replace(/^Phone Call\b[\s:]*/i, "");
        }
        if (type === "schedule") {
          return summary.replace(/^Scheduled\b[\s:]*/i, "");
        }
        if (type === "meeting") {
          return summary;
        }
        if (type === "reminder") {
          return summary.replace(/^Reminder\b[\s:]*/i, "");
        }
        return summary;
      }

      function renderNotesWidget(record, title) {
        const lastContact = formatDate(record.lastContactDate || record.lastUpdatedDate || record.dateProfileCreated);
        const widgetTitle = String(title || "Activity Tracker");

        return `
          <section class="client-detail-card client-detail-card-compact client-notes-widget-card">
            <div class="client-notes-widget-topline">
              <h2>${escapeHtml(widgetTitle)}</h2>
              <span class="client-notes-widget-last-contact" data-activity-last-contact>Last Contact ${escapeHtml(lastContact)}</span>
            </div>
            <div class="client-notes-widget-body">
              <div class="client-notes-widget-paper">
                <div data-activity-preview>
                  ${renderActivityPreview(record)}
                </div>
              </div>
              <div class="client-notes-widget-actions">
                <button type="button" class="client-notes-widget-action client-notes-widget-action-primary" data-activity-log-open>Log Activity</button>
                <div class="client-activity-drawer" data-activity-modal hidden>
                  <div class="client-activity-drawer-panel" role="dialog" aria-modal="false" aria-labelledby="client-activity-modal-title">
                    <div class="client-activity-menu" data-activity-menu>
                      <div class="client-activity-modal-header">
                        <div class="client-activity-modal-heading">
                          <h2 id="client-activity-modal-title">Log Activity</h2>
                          <p>Choose the activity you want to add to this profile.</p>
                        </div>
                        <button class="client-activity-modal-close" type="button" data-activity-modal-close aria-label="Close activity options">×</button>
                      </div>
                      <div class="client-activity-modal-grid">
                        <button type="button" class="client-activity-option" data-activity-option="note">
                          <span class="client-activity-option-title">Add Note</span>
                          <span class="client-activity-option-copy">Capture a quick written update.</span>
                        </button>
                        <button type="button" class="client-activity-option" data-activity-option="email">
                          <span class="client-activity-option-title">Log Email</span>
                          <span class="client-activity-option-copy">Record a sent or received email.</span>
                        </button>
                        <button type="button" class="client-activity-option" data-activity-option="phone">
                          <span class="client-activity-option-title">Add Phone Call</span>
                          <span class="client-activity-option-copy">Track a call outcome or callback.</span>
                        </button>
                        <button type="button" class="client-activity-option" data-activity-option="schedule">
                          <span class="client-activity-option-title">Schedule Meeting</span>
                          <span class="client-activity-option-copy">Add an upcoming meeting touchpoint.</span>
                        </button>
                        <button type="button" class="client-activity-option" data-activity-option="meeting">
                          <span class="client-activity-option-title">Add Meeting</span>
                          <span class="client-activity-option-copy">Log a meeting that already happened.</span>
                        </button>
                        <button type="button" class="client-activity-option" data-activity-option="reminder">
                          <span class="client-activity-option-title">Set Reminder</span>
                          <span class="client-activity-option-copy">Create a follow-up reminder.</span>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderChecklistCard(title, items, record) {
        const incompleteItems = items.filter(function (item) { return !item.complete; });
        const completedCount = items.length - incompleteItems.length;
        const nextItem = incompleteItems[0] || null;
        const nextActionTitle = nextItem ? nextItem.label : "All core steps complete";
        const nextAction = nextItem ? getChecklistAction(record, nextItem) : null;

        return `
          <section class="client-detail-card client-detail-card-compact client-detail-card-checklist">
            <div class="client-detail-card-header">
              <h2>${escapeHtml(title)}</h2>
            </div>
            <div class="client-checklist-next ${nextItem ? "is-incomplete" : "is-complete"}">
              ${nextAction ? `
                <a class="client-checklist-next-button" href="${escapeHtml(nextAction.href)}" data-linked-case-ref="${escapeHtml(String(record?.caseRef || "").trim())}" data-linked-record-id="${escapeHtml(String(record?.id || "").trim())}">
                  <span class="client-checklist-next-top">
                    <span class="client-checklist-next-label">Next Action</span>
                    <span class="client-checklist-next-row">
                      <strong>${escapeHtml(nextActionTitle)}</strong>
                      <img class="client-checklist-next-icon" src="../Images/start_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="" aria-hidden="true">
                    </span>
                  </span>
                </a>
              ` : `
                <div class="client-checklist-next-top">
                  <span class="client-checklist-next-label">Next Action</span>
                  <div class="client-checklist-next-row">
                    <strong>${escapeHtml(nextActionTitle)}</strong>
                    <img class="client-checklist-next-icon" src="../Images/start_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="" aria-hidden="true">
                  </div>
                </div>
              `}
            </div>
            <div class="client-checklist-progress">${completedCount} of ${items.length} complete</div>
            <div class="client-checklist-list">
              ${items.map(function (item) {
                const action = getChecklistAction(record, item);
                return `
                  <div class="client-checklist-row ${item.complete ? "is-complete" : "is-incomplete"}">
                    <div class="client-checklist-row-copy">
                      <strong>${escapeHtml(item.label)}</strong>
                      <span>${escapeHtml(item.detail)}</span>
                    </div>
                    ${item.complete ? `
                      <span class="client-checklist-status">Complete</span>
                    ` : action ? `
                      <a class="client-checklist-action" href="${escapeHtml(action.href)}" data-linked-case-ref="${escapeHtml(String(record?.caseRef || "").trim())}" data-linked-record-id="${escapeHtml(String(record?.id || "").trim())}">
                        ${escapeHtml(action.label)}
                      </a>
                    ` : `
                      <span class="client-checklist-status">Incomplete</span>
                    `}
                  </div>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }

      function renderCoverageCard(record) {
        const policies = Array.isArray(record.coveragePolicies) ? record.coveragePolicies : [];
        const previewPolicies = policies.slice(0, 2);
        const title = policies.length ? "Coverage Placed" : "Add Coverage";
        const actionLabel = policies.length ? "Add Another Policy" : "Add Policy";
        const recordId = encodeURIComponent(String(record.id || "").trim());
        const canAddPolicy = policies.length < 30;

        return `
          <section class="client-detail-card client-detail-card-compact client-coverage-card">
            <div class="client-detail-card-header client-detail-card-header-coverage">
              <h2>${escapeHtml(title)}</h2>
              <a
                class="client-coverage-add-button${canAddPolicy ? "" : " is-disabled"}"
                ${canAddPolicy ? `href="add-coverage.html?id=${recordId}&newPolicy=1"` : ""}
                ${canAddPolicy ? "" : `aria-disabled="true" tabindex="-1"`}
              >${escapeHtml(canAddPolicy ? actionLabel : "Policy Limit Reached")}</a>
            </div>
            <div class="client-coverage-card-body">
              ${policies.length ? `
                <div class="client-coverage-policy-list">
                ${previewPolicies.map(function (policy, index) {
                  return `
                    <article
                      class="client-coverage-policy-item"
                      data-coverage-policy-card
                      data-policy-index="${index}"
                      tabindex="0"
                      role="button"
                      aria-label="Open ${escapeHtml(formatValue(policy.policyCarrier))} policy details"
                    >
                      <div class="client-coverage-policy-topline">
                        <strong>${escapeHtml(formatValue(policy.policyCarrier))}</strong>
                        <span>${escapeHtml(formatCurrency(policy.faceAmount))}</span>
                      </div>
                      <div class="client-coverage-policy-meta">
                        <span>${escapeHtml(formatValue(policy.policyType))}</span>
                        <span>${escapeHtml(formatValue(policy.insuredName))}</span>
                      </div>
                      <div class="client-coverage-policy-meta">
                        <span>Policy ${escapeHtml(formatValue(policy.policyNumber || `#${index + 1}`))}</span>
                        <span>Effective ${escapeHtml(formatDate(policy.effectiveDate))}</span>
                      </div>
                    </article>
                  `;
                }).join("")}
                </div>
              ` : `
                <div class="client-coverage-policy-list is-empty">
                  <p class="client-coverage-empty">No policies saved to this profile yet.</p>
                </div>
              `}
            </div>
            <button
              class="client-coverage-view-all-button${policies.length > 2 ? " is-active" : ""}"
              type="button"
              data-view-all-policies
              ${policies.length > 2 ? "" : "disabled"}
            >View All</button>
          </section>
        `;
      }

      function renderStatCard(title, value, meta, options) {
        const isEditable = Boolean(options?.editable);
        const fieldName = String(options?.fieldName || "").trim();
        const rawValue = String(options?.rawValue || "").trim();
        const showMeta = String(meta || "").trim().length > 0;
        const numericRawValue = Number(String(rawValue || "").replace(/,/g, ""));
        const coverageGapStateClass = fieldName === "coverageGap"
          ? (Number.isFinite(numericRawValue) && numericRawValue === 0 ? " is-zero" : " has-gap")
          : "";

        return `
          <section class="client-detail-card client-detail-stat-card${isEditable ? " is-editable" : ""}">
            <div class="client-detail-stat-header">
              <span>${escapeHtml(title)}</span>

        const coverageAmount = Number(String(record.coverageAmount || "").replace(/,/g, ""));

        const safeCoverageAmount = Number.isFinite(coverageAmount) ? Math.max(0, coverageAmount) : 0;
        const safeCoverageGap = Number.isFinite(coverageGap) ? Math.max(0, coverageGap) : 0;
        const totalNeed = safeCoverageAmount + safeCoverageGap;

        if (totalNeed <= 0) {
          return 0;
        }

        return Math.max(0, Math.min(100, Math.round((safeCoverageAmount / totalNeed) * 100)));
      }

      function saveRecordField(fieldName, nextValue) {
        const records = loadJson(localStorage, getRecordsStorageKey());
        if (!Array.isArray(records)) {
          return;
        }

        const recordIndex = records.findIndex(function (item) {
          return String(item?.id || "").trim() === String(record.id || "").trim();
        });

        if (recordIndex === -1) {
          return;
        }

        records[recordIndex] = {
          ...records[recordIndex],
          [fieldName]: nextValue,
          lastUpdatedDate: new Date().toISOString().slice(0, 10)
        };

        localStorage.setItem(getRecordsStorageKey(), JSON.stringify(records));
        record[fieldName] = nextValue;
      }

      function normalizeCurrencyInput(value) {
        const normalized = String(value || "").replace(/[^0-9.]/g, "");
        const firstDot = normalized.indexOf(".");

        if (firstDot === -1) {
          return normalized;
        }

        const integerPart = normalized.slice(0, firstDot + 1);
        const decimalPart = normalized.slice(firstDot + 1).replace(/\./g, "");
        return integerPart + decimalPart;
      }

      function clampStatValue(fieldName, value) {
        const numericValue = Number(String(value || "").replace(/,/g, ""));
        if (!Number.isFinite(numericValue)) {
          return "";
        }

        if (fieldName === "coverageAmount") {
          return String(Math.min(numericValue, 99999999));
        }

        return String(numericValue);
      }

      function formatEditableCurrency(value) {
        const number = Number(String(value || "").replace(/,/g, ""));
        if (!number) {
          return "0";
        }

        return new Intl.NumberFormat("en-US", {
          maximumFractionDigits: 2
        }).format(number);
      }

      function formatCoverageCardCurrency(value) {
        const number = Number(String(value || "").replace(/,/g, ""));
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          maximumFractionDigits: 0
        }).format(Number.isFinite(number) ? number : 0);
      }
